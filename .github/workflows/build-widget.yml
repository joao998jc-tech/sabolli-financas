name: Build Widget APK

on:
  push:
    branches: [main]
    paths:
      - 'sabolli-widget/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build APK (release com debug keystore)
        working-directory: sabolli-widget
        run: gradle assembleRelease

      - name: Renomear APK
        run: |
          mkdir -p output
          cp sabolli-widget/app/build/outputs/apk/release/app-release.apk output/sabolli-widget.apk
          echo "APK_PATH=output/sabolli-widget.apk" >> $GITHUB_ENV

      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: widget-v${{ github.run_number }}
          name: "Widget Sabolli v${{ github.run_number }}"
          body: |
            ## Como instalar
            1. Baixe o arquivo `sabolli-widget.apk`
            2. No celular: Configurações → Segurança → **Instalar apps desconhecidos** → ative para o seu navegador/gerenciador de arquivos
            3. Abra o APK e instale
            4. Segure o dedo na tela inicial → Widgets → procure **Sabolli**
            5. Arraste o widget para a tela inicial
            6. Cole o **Código do Widget** que aparece no app (menu → Temas do App → seção Widget)
          files: output/sabolli-widget.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
