name: Deploy para Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firebase Hosting + Firestore Rules
        run: |
          echo "{\"v\":\"$(date -u +%Y%m%d%H%M%S)\"}" > version.json
          firebase deploy --only hosting --project sabolli-financas 2>&1 | tee /tmp/deploy.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            grep -q "current active version" /tmp/deploy.log && echo "Versao ja ativa (OK)" || exit $EXIT
          fi
          firebase deploy --only firestore:rules --project sabolli-financas 2>&1 || echo "Rules: ignorado (sem permissao de servico)"
